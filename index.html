<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="resources/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Newsletter</title>
</head>
<body>
    <main class="container">
        <div class="icon-container">
            <img src="resources/logo.svg" alt=""/>
        </div>
        <h1>Join our newsletter</h1>

        <p class="text">Keep up with our latest collections, exclusive deals, and special offers!
            We introduce a new collection every week, so stay tuned to snag the hottest item nust for you.
        </p>

        <section class="card">
            <input type="email" placeholder="Enter your email address" required>
            <div class="btn-div">
                <button type="submit">Subscribe now</button>
            </div>
            <p>Your email is 100% confidential and won't send you any spam</p>
        </section>
    </main>
    
</body>
</html>
